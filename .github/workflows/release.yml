name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to build for dry run"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version_guard:
    name: Version Guard
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Install release-check dependencies
        run: |
          python -m pip install --upgrade pip packaging PyYAML

      - name: Check release version
        id: version
        run: |
          python scripts/check_release_version.py

      - name: Enforce main-only release policy
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch origin main
          TAG_COMMIT="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git merge-base --is-ancestor "$TAG_COMMIT" origin/main

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: version_guard
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      PYTHONPATH: src:.
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and quality-check dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev,plots,detectors]"

      - name: Run tests
        run: python -m pytest -q

      - name: Run lint
        run: python -m ruff check .

      - name: Run type check
        run: python -m mypy --ignore-missing-imports src

  build:
    name: Build Distribution Artifacts
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Build package
        run: |
          rm -rf dist build *.egg-info
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check --strict dist/*

      - name: Smoke install wheel
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import tsconformal
          from tsconformal import SegmentedTransportCalibrator

          print(tsconformal.__version__)
          print(SegmentedTransportCalibrator)
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish_testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [version_guard, build]
    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.version_guard.outputs.is_prerelease == 'true'
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

  publish_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [version_guard, build]
    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.version_guard.outputs.is_prerelease == 'false'
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/

  github_prerelease:
    name: Create GitHub Prerelease
    runs-on: ubuntu-latest
    needs: [publish_testpypi]
    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist

      - name: Create or update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$REPO" --clobber
          else
            gh release create "$TAG" dist/* \
              --repo "$REPO" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag \
              --prerelease
          fi

  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish_pypi]
    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$REPO" --clobber
          else
            gh release create "$TAG" dist/* \
              --repo "$REPO" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
          fi
